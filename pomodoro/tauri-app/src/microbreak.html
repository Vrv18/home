<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Micro Break</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: rgba(26, 22, 18, 0.85);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      color: #FAF8F5;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      cursor: default;
      overflow: hidden;
    }

    .microbreak-content {
      text-align: center;
      padding: 4rem;
      max-width: 600px;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 2rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.9;
      }
      50% {
        transform: scale(1.1);
        opacity: 1;
      }
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
      color: #E5DCC5;
    }

    p {
      font-size: 1.2rem;
      color: #C6A87C;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .timer-circle {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 2rem auto;
    }

    .timer-circle svg {
      transform: rotate(-90deg);
    }

    .timer-circle-bg {
      fill: none;
      stroke: rgba(198, 168, 124, 0.2);
      stroke-width: 4;
    }

    .timer-circle-progress {
      fill: none;
      stroke: #C6A87C;
      stroke-width: 4;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
    }

    .timer-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.5rem;
      font-weight: 300;
      color: #E5DCC5;
    }

    .hint {
      font-size: 0.9rem;
      color: rgba(229, 220, 197, 0.5);
      margin-top: 2rem;
    }

    .dismiss-btn {
      background: rgba(198, 168, 124, 0.2);
      border: 1px solid rgba(198, 168, 124, 0.3);
      color: #E5DCC5;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 1rem;
    }

    .dismiss-btn:hover {
      background: rgba(198, 168, 124, 0.3);
      border-color: rgba(198, 168, 124, 0.5);
    }
  </style>
</head>
<body>
  <div class="microbreak-content">
    <div class="icon">👁️</div>
    <h1 id="message">Look away from screen</h1>
    <p id="tip">Focus on something 20 feet away</p>
    
    <div class="timer-circle">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle class="timer-circle-bg" cx="40" cy="40" r="36" />
        <circle 
          id="progressCircle"
          class="timer-circle-progress" 
          cx="40" 
          cy="40" 
          r="36"
          stroke-dasharray="226.195"
          stroke-dashoffset="0"
        />
      </svg>
      <div class="timer-text" id="countdown">10</div>
    </div>

    <button class="dismiss-btn" id="dismissBtn">Continue Working</button>
    <div class="hint">Auto-closes in <span id="autoClose">10</span> seconds</div>
  </div>

  <script type="module" src="/microbreak.js"></script>
</body>
</html>
